<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Investigation Board: The Mystery of ThothDaddy</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/4.3.0/marked.min.js"></script>
    <style>
        :root {
            --bg-color: #0f0f0f;
            --node-bg: #1a1a1a;
            --text-color: #e0e0e0;
            --accent: #e29e1f;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        #canvas-container {
            width: 100vw; height: 100vh;
            cursor: grab;
            position: relative;
        }

        #canvas {
            position: absolute;
            transform-origin: 0 0;
            will-change: transform;
        }

        .node {
            position: absolute;
            background: var(--node-bg);
            border: 1px solid #333;
            border-radius: 4px;
            padding: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.6);
            font-size: 13px;
            overflow-y: auto;
            z-index: 2;
        }

        /* Obsidian Color System */
        .color-1 { border: 2px solid #e94b3c; } .color-2 { border: 2px solid #e29e1f; }
        .color-3 { border: 2px solid #31b44a; } .color-4 { border: 2px solid #24808a; }
        .color-5 { border: 2px solid #a352cc; } .color-6 { border: 2px solid #e4377d; }

        .node img {
            max-width: 100%;
            height: auto;
            margin: 8px 0;
            border-radius: 4px;
            border: 1px solid #444;
        }

        svg#edge-layer {
            position: absolute;
            top: -10000px; left: -10000px;
            width: 20000px; height: 20000px;
            pointer-events: none;
            z-index: 1;
        }

        path.edge-line {
            stroke: #666;
            stroke-width: 2;
            fill: none;
            opacity: 0.6;
        }

        #ui {
            position: fixed;
            top: 20px; right: 20px;
            background: rgba(0,0,0,0.8);
            padding: 10px 15px;
            border-radius: 6px;
            border: 1px solid #444;
            z-index: 100;
        }
    </style>
</head>
<body>

<div id="ui">
    <strong>Investigation Board</strong><br>
    <small>Double-click to zoom in | Drag to Pan</small>
</div>

<div id="canvas-container">
    <div id="canvas">
        <svg id="edge-layer"></svg>
        <div id="node-layer"></div>
    </div>
</div>

<script>
    const canvas = document.getElementById('canvas');
    const nodeLayer = document.getElementById('node-layer');
    const edgeLayer = document.getElementById('edge-layer');

    let scale = 0.3;
    let translateX = window.innerWidth / 2;
    let translateY = window.innerHeight / 2;

    async function init() {
        try {
            const response = await fetch('Mystery.canvas');
            const data = await response.json();
            
            // Render basic structure
            await renderNodes(data.nodes);
            renderEdges(data.edges, data.nodes);
            
            // Center the view on the crime scene
            centerOnNode("-3018", "-2660"); 
        } catch (e) {
            console.error("Initialization error:", e);
        }
    }

    async function renderNodes(nodes) {
        for (const node of nodes) {
            const div = document.createElement('div');
            div.className = `node color-${node.color || ''}`;
            div.id = `node-${node.id}`;
            div.style.left = `${node.x}px`;
            div.style.top = `${node.y}px`;
            div.style.width = `${node.width}px`;
            div.style.height = `${node.height}px`;

            if (node.type === 'text') {
                div.innerHTML = marked.parse(node.text);
            } else if (node.type === 'file') {
                // Fetch the .md file content
                try {
                    const fileResp = await fetch(node.file);
                    let content = await fileResp.text();
                    
                    // Parse Obsidian ![[image.jpg]] syntax
                    content = content.replace(/!\[\[(.*?)\]\]/g, (match, fileName) => {
                        return `<img src="${fileName}" alt="${fileName}">`;
                    });

                    div.innerHTML = `<strong>${node.file.split('/').pop()}</strong><hr>` + marked.parse(content);
                } catch (e) {
                    div.innerHTML = `<strong>File:</strong> ${node.file}<br><em>(Content missing)</em>`;
                }
            }
            nodeLayer.appendChild(div);
        }
    }

    function renderEdges(edges, nodes) {
        edges.forEach(edge => {
            const from = nodes.find(n => n.id === edge.fromNode);
            const to = nodes.find(n => n.id === edge.toNode);
            if (!from || !to) return;

            const start = getAnchor(from, edge.fromSide);
            const end = getAnchor(to, edge.toSide);

            const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
            path.setAttribute("class", "edge-line");
            
            // Simple straight line path
            const d = `M ${start.x} ${start.y} L ${end.x} ${end.y}`;
            path.setAttribute("d", d);
            
            if (edge.color) {
                // Map Obsidian edge colors to hex if needed
                path.style.stroke = edge.color.length > 2 ? edge.color : '#888';
            }
            
            edgeLayer.appendChild(path);
        });
    }

    function getAnchor(n, side) {
        if (side === 'top') return { x: n.x + n.width/2, y: n.y };
        if (side === 'bottom') return { x: n.x + n.width/2, y: n.y + n.height };
        if (side === 'left') return { x: n.x, y: n.y + n.height/2 };
        if (side === 'right') return { x: n.x + n.width, y: n.y + n.height/2 };
        return { x: n.x + n.width/2, y: n.y + n.height/2 };
    }

    function centerOnNode(x, y) {
        translateX = (window.innerWidth / 2) - (x * scale);
        translateY = (window.innerHeight / 2) - (y * scale);
        updateTransform();
    }

    // Interaction Logic
    function updateTransform() {
        canvas.style.transform = `translate(${translateX}px, ${translateY}px) scale(${scale})`;
    }

    window.addEventListener('wheel', (e) => {
        e.preventDefault();
        const delta = e.deltaY > 0 ? 0.9 : 1.1;
        scale *= delta;
        updateTransform();
    }, { passive: false });

    let isDragging = false, startX, startY;
    window.addEventListener('mousedown', e => {
        isDragging = true;
        startX = e.clientX - translateX;
        startY = e.clientY - translateY;
    });
    window.addEventListener('mousemove', e => {
        if (!isDragging) return;
        translateX = e.clientX - startX;
        translateY = e.clientY - startY;
        updateTransform();
    });
    window.addEventListener('mouseup', () => isDragging = false);

    init();
</script>
</body>
</html>
